<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i'm blushing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header-container {
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 20px; 
            margin-bottom: 30px;
            margin-top: -10px; 
        }

        .logo-image {
            height: 200px; 
            width: auto;
            mix-blend-mode: multiply; 
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin: 0; 
            font-weight: bold; 
        }

        #filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            /* Pulled the menu down close to the top of the canvas */
            margin-bottom: 10px; 
            position: relative;
            z-index: 20;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #ddd;
            padding: 8px 18px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: #d17a7a;
            color: #d17a7a;
        }

        .filter-btn.active {
            background: #d17a7a;
            border-color: #d17a7a;
            color: white;
        }

        #viz-container {
            width: 100%;
            max-width: 1600px;
            height: 1200px;
            position: relative;
            /* Slide the canvas upward to hide the empty physics gap behind the menu */
            margin-top: -120px; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        #viz-container svg {
            min-width: 1200px;
            min-height: 1200px; 
        }

        .tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            font-size: 0.85rem;
            line-height: 1.4;
            /* Only center horizontally. JS handles the vertical pinning */
            transform: translateX(-50%);
            border: 1px solid #eee;
            z-index: 10;
        }

        .tooltip b {
            font-weight: 500;
            color: #111;
            display: block;
            margin-bottom: 2px;
        }

        .tooltip .shade-name {
            color: #666;
        }

        #status-message {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }
            #viz-container {
                height: 75vh; 
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <a href="/">
            <img src="src/blush.png" alt="blushing logo" class="logo-image" width="30%">
        </a>
        <div class="subtitle"><i>i'm blushing!</i><br><br>an interactive directory of <br> every blush shade currently <br> offered at ulta + sephora</div>
    </div>
    <div id="filters">
        <button class="filter-btn active" data-category="All">All Shades</button>
        <button class="filter-btn" data-category="Pinks & Reds">Pinks & Reds</button>
        <button class="filter-btn" data-category="Corals & Peaches">Corals & Peaches</button>
        <button class="filter-btn" data-category="Mauves & Berries">Mauves & Berries</button>
        <button class="filter-btn" data-category="Nudes & Neutrals">Nudes & Neutrals</button>
    </div>

    <div id="viz-container">
        <div id="status-message">Gathering shade data...</div>
        <div id="tooltip" class="tooltip"></div>
    </div>

    <p style="color:#672a45; font-size: 0.8rem;">made by bg &hearts; <br> ulta data from <a href="https://barefaced.substack.com/p/have-we-reached-peak-blush">barefacedmedia</a> <br>sephora data & scraping script available on my <a href="https://github.com/bellagracefinck/blush-finder">github repo</a></p>

    <script>
        let masterData = [];

        function hexToHSL(hex) {
            hex = hex.replace(/^#/, '');
            let r = parseInt(hex.substring(0, 2), 16) / 255;
            let g = parseInt(hex.substring(2, 4), 16) / 255;
            let b = parseInt(hex.substring(4, 6), 16) / 255;

            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max == min) { h = s = 0; } 
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            
            h = Math.round(h * 360);
            let adjustedHue = h > 180 ? h - 360 : h;
            
            return { h: adjustedHue, s: s, l: l }; 
        }

        function categorizeColor(hsl) {
            if (hsl.s < 0.30 || (hsl.l > 0.70 && hsl.s < 0.45) || hsl.h > 20) return 'Nudes & Neutrals';
            if (hsl.h < -15) return 'Mauves & Berries';
            if (hsl.h >= -15 && hsl.h < 5) return 'Pinks & Reds';
            if (hsl.h >= 5 && hsl.h <= 20) return 'Corals & Peaches';
            return 'Other';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const filesToFetch = [
                'data/ulta_blushes.csv',
                'data/sephora_blushes.csv'
            ];

            Promise.all(filesToFetch.map(url => fetch(url).then(res => {
                if (!res.ok) throw new Error(`Failed to load ${url}`);
                return res.text();
            })))
            .then(csvTexts => {
                let idCounter = 0;
                csvTexts.forEach(csvText => {
                    let parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                    parsed.data.forEach(row => {
                        let hexCode = row['dominant color 1'];
                        if (hexCode && hexCode.startsWith('#')) {
                            let hsl = hexToHSL(hexCode);
                            row.id = idCounter++;
                            row.hsl = hsl;
                            row.category = categorizeColor(hsl);
                            masterData.push(row);
                        }
                    });
                });

                document.getElementById('status-message').style.display = 'none';
                initChart(masterData);
            })
            .catch(error => {
                document.getElementById('status-message').innerText = "Data missing. Ensure server is running.";
            });
        });

        let simulation, svg, node;
        const width = 2000, height = 2400; 
        const radius = 12; 
        const padding = 30; 

        function initChart(data) {
            const container = d3.select("#viz-container");
            const tooltip = d3.select("#tooltip");
            let activeMobileNodeId = null;

            svg = container.append("svg")
                .attr("width", "100%")
                .attr("height", "100%")
                .attr("viewBox", `0 0 ${width} ${height}`);

            // Clear tooltip if clicking empty space
            svg.on("click", function(event) {
                if (event.target.tagName !== 'circle') {
                    activeMobileNodeId = null;
                    tooltip.style("opacity", 0);
                    d3.selectAll('.node')
                        .transition().duration(200)
                        .attr("r", radius)
                        .style("stroke", "rgba(0,0,0,0.08)")
                        .style("stroke-width", 1);
                }
            });

            const xScale = d3.scaleLinear().domain([-60, 60]).range([150, width - 150]);
            
            // Pushed the top bound down to 250 so the big 12px dots don't flatten out against the ceiling
            const yScale = d3.scaleLinear().domain([1.0, 0.0]).range([250, height - 100]); 

            simulation = d3.forceSimulation()
                .force("x", d3.forceX(d => xScale(d.hsl.h)).strength(0.15))
                .force("y", d3.forceY(d => yScale(d.hsl.l)).strength(0.15))
                .force("collide", d3.forceCollide(radius + 1.5).iterations(4)) 
                .force("charge", d3.forceManyBody().strength(-0.5)); 

            d3.selectAll('.filter-btn').on('click', function() {
                d3.selectAll('.filter-btn').classed('active', false);
                d3.select(this).classed('active', true);
                let category = d3.select(this).attr('data-category');
                
                activeMobileNodeId = null;
                tooltip.style("opacity", 0);
                
                updateChart(category === 'All' ? masterData : masterData.filter(d => d.category === category));
            });

            function updateChart(filteredData) {
                node = svg.selectAll(".node")
                    .data(filteredData, d => d.id);

                node.exit()
                    .transition().duration(400)
                    .attr("r", 0)
                    .remove();

                let nodeEnter = node.enter().append("circle")
                    .attr("class", "node")
                    .attr("r", 0)
                    .style("fill", d => d['dominant color 1'])
                    .style("stroke", "rgba(0,0,0,0.08)")
                    .style("stroke-width", 1)
                    .style("cursor", "pointer")
                    .on("mouseover", function(event, d) {
                        
                        // Enlarge the circle
                        d3.select(this)
                            .transition().duration(200)
                            .attr("r", radius * 2.5)
                            .style("stroke", "rgba(0,0,0,0.4)")
                            .style("stroke-width", 2);

                        // --- PERFECT TOOLTIP CENTERING ---
                        // Get the exact dimensions and position of the hovered circle
                        const circleRect = this.getBoundingClientRect();
                        const containerNode = document.getElementById("viz-container");
                        const containerRect = containerNode.getBoundingClientRect();

                        // Calculate the absolute bottom-center of the circle relative to the container
                        const leftPos = (circleRect.left - containerRect.left) + (circleRect.width / 2) + containerNode.scrollLeft;
                        const topPos = (circleRect.bottom - containerRect.top) + containerNode.scrollTop;

                        tooltip.html(`<b>${d.brand}</b><div class="shade-name">${d.name}<br>Shade: ${d.shade}</div>`)
                            .style("opacity", 1)
                            .style("left", leftPos + "px")
                            .style("top", (topPos + 8) + "px"); // Add an 8px gap below the circle
                    })
                    // Note: 'mousemove' is completely removed so the tooltip doesn't follow the cursor anymore!
                    .on("mouseout", function(event, d) {
                        if (window.innerWidth > 768 || activeMobileNodeId !== d.id) {
                            d3.select(this)
                                .transition().duration(200)
                                .attr("r", radius)
                                .style("stroke", "rgba(0,0,0,0.08)")
                                .style("stroke-width", 1);
                            tooltip.style("opacity", 0);
                        }
                    })
                    .on("click", function(event, d) {
                        event.stopPropagation(); 

                        if (window.innerWidth <= 768) {
                            if (activeMobileNodeId !== d.id) {
                                activeMobileNodeId = d.id;
                                d3.selectAll('.node')
                                  .transition().duration(200)
                                  .attr("r", radius)
                                  .style("stroke", "rgba(0,0,0,0.08)")
                                  .style("stroke-width", 1);
                                  
                                d3.select(this)
                                  .transition().duration(200)
                                  .attr("r", radius * 2.5)
                                  .style("stroke", "rgba(0,0,0,0.4)")
                                  .style("stroke-width", 2);
                                  
                                const circleRect = this.getBoundingClientRect();
                                const containerNode = document.getElementById("viz-container");
                                const containerRect = containerNode.getBoundingClientRect();
                                const leftPos = (circleRect.left - containerRect.left) + (circleRect.width / 2) + containerNode.scrollLeft;
                                const topPos = (circleRect.bottom - containerRect.top) + containerNode.scrollTop;

                                tooltip.html(`<b>${d.brand}</b><div class="shade-name">${d.name}<br>Shade: ${d.shade}</div>`)
                                    .style("opacity", 1)
                                    .style("left", leftPos + "px")
                                    .style("top", (topPos + 8) + "px");

                                return; 
                            }
                        }
                        
                        window.open(d['product url'], '_blank');
                    });

                nodeEnter.transition().duration(400).attr("r", radius);

                node = nodeEnter.merge(node);

                simulation.nodes(filteredData).on("tick", () => {
                    node.attr("cx", d => d.x = Math.max(padding, Math.min(width - padding, d.x)))
                        .attr("cy", d => d.y = Math.max(padding, Math.min(height - padding, d.y)));
                });
                
                simulation.alpha(0.8).restart();
            }

            updateChart(data);
        }
    </script>

</body>
</html>
